name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — no errors
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src --max-warnings 0
        continue-on-error: true   # warnings-only until lint baseline is clean

      - name: Build
        run: npm run build
        env:
          # Provide dummy values so Vite build doesn't fail on missing env vars.
          # Real values are never stored in CI; the anon key is safe to be public.
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
          VITE_SUPABASE_PROJECT_ID: placeholder
